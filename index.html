<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熊猫历险记</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #sync-cloud-btn:hover { background: rgba(40,80,140,0.9) !important; transform: scale(1.08); box-shadow: 0 4px 20px rgba(100,150,255,0.3); }
    #sync-cloud-btn.has-changes { border-color: rgba(255,200,50,0.8) !important; animation: syncPulse 2s infinite; }
    #sync-cloud-btn.has-changes { filter: drop-shadow(0 0 6px rgba(255,200,50,0.8)); }
    @keyframes syncPulse { 0%,100% { box-shadow: 0 2px 12px rgba(0,0,0,0.3); } 50% { box-shadow: 0 2px 20px rgba(255,200,50,0.4); } }
    @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    .sync-config-modal { position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px); }
    .sync-config-panel { background:linear-gradient(135deg,#1a2a4a,#0d1a2d);border:1px solid rgba(100,150,255,0.3);border-radius:12px;padding:24px;min-width:360px;max-width:90vw;color:#e0e8f0;font-family:var(--font-main,sans-serif);box-shadow:0 8px 40px rgba(0,0,0,0.5); }
    .sync-config-title { font-size:18px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px; }
    .sync-config-field { margin-bottom:14px; }
    .sync-config-label { display:block;font-size:12px;color:#8aa;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px; }
    .sync-config-input { width:100%;padding:10px 12px;background:rgba(0,0,0,0.3);border:1px solid rgba(100,150,255,0.3);border-radius:6px;color:#fff;font-size:14px;outline:none;transition:border 0.2s;box-sizing:border-box; }
    .sync-config-input:focus { border-color: rgba(100,180,255,0.8); }
    .sync-config-hint { font-size:11px;color:#688;margin-top:4px; }
    .sync-config-actions { display:flex;gap:10px;margin-top:20px;justify-content:flex-end; }
    .sync-config-btn { padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s; }
    .sync-config-btn.primary { background:linear-gradient(135deg,#4080ff,#3060dd);color:#fff; }
    .sync-config-btn.primary:hover { background:linear-gradient(135deg,#5090ff,#4070ee); }
    .sync-config-btn.secondary { background:rgba(255,255,255,0.1);color:#aac; }
    .sync-config-btn.secondary:hover { background:rgba(255,255,255,0.15); }
    .sync-status { font-size:11px;color:#688;text-align:center;margin-top:10px; }
    #sync-toast { position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:8px;font-size:14px;z-index:100001;transition:all 0.3s;opacity:0;pointer-events:none;backdrop-filter:blur(10px);font-family:var(--font-main,sans-serif);white-space:nowrap; }
  </style>
  <!-- Three.js CDN (带加载检测和备用) -->
  <script>
    window.__threeLoaded = false;
    window.__orbitControlsLoaded = false;
    function loadScript(src, onLoad, onError) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = onLoad;
      s.onerror = onError;
      document.head.appendChild(s);
      return s;
    }
    function tryLoadThree(cdnIndex) {
      var cdns = [
        {
          three: 'https://unpkg.com/three@0.126.0/build/three.min.js',
          orbit: 'https://unpkg.com/three@0.126.0/examples/js/controls/OrbitControls.js',
          composer: 'https://unpkg.com/three@0.126.0/examples/js/postprocessing/EffectComposer.js',
          renderpass: 'https://unpkg.com/three@0.126.0/examples/js/postprocessing/RenderPass.js',
          bloom: 'https://unpkg.com/three@0.126.0/examples/js/postprocessing/UnrealBloomPass.js',
          shaderpass: 'https://unpkg.com/three@0.126.0/examples/js/postprocessing/ShaderPass.js',
          copyshader: 'https://unpkg.com/three@0.126.0/examples/js/shaders/CopyShader.js',
          luminance: 'https://unpkg.com/three@0.126.0/examples/js/shaders/LuminosityHighPassShader.js'
        },
        {
          three: 'https://cdn.jsdelivr.net/npm/three@0.126.0/build/three.min.js',
          orbit: 'https://cdn.jsdelivr.net/npm/three@0.126.0/examples/js/controls/OrbitControls.js',
          composer: 'https://cdn.jsdelivr.net/npm/three@0.126.0/examples/js/postprocessing/EffectComposer.js',
          renderpass: 'https://cdn.jsdelivr.net/npm/three@0.126.0/examples/js/postprocessing/RenderPass.js',
          bloom: 'https://cdn.jsdelivr.net/npm/three@0.126.0/examples/js/postprocessing/UnrealBloomPass.js',
          shaderpass: 'https://cdn.jsdelivr.net/npm/three@0.126.0/examples/js/postprocessing/ShaderPass.js',
          copyshader: 'https://cdn.jsdelivr.net/npm/three@0.126.0/examples/js/shaders/CopyShader.js',
          luminance: 'https://cdn.jsdelivr.net/npm/three@0.126.0/examples/js/shaders/LuminosityHighPassShader.js'
        }
      ];
      var cdn = cdns[cdnIndex];
      if (!cdn) {
        console.error('[Bootstrap] 所有 Three.js CDN 都加载失败');
        return;
      }
      console.log('[Bootstrap] 尝试 Three.js CDN #' + (cdnIndex + 1) + ':', cdn.three);
      
      // 按顺序加载
      loadScript(cdn.three, function() {
        console.log('[Bootstrap] Three.js 加载成功，版本:', THREE.REVISION);
        window.__threeLoaded = true;
        loadScript(cdn.orbit, function() {
          console.log('[Bootstrap] OrbitControls 加载成功');
          window.__orbitControlsLoaded = true;
          // 加载后处理（可选，失败不影响主功能）
          loadScript(cdn.composer, function() {
            loadScript(cdn.shaderpass, function() {
              loadScript(cdn.copyshader, function() {
                loadScript(cdn.renderpass, function() {
                  loadScript(cdn.luminance, function() {
                    loadScript(cdn.bloom, function() {
                      console.log('[Bootstrap] Bloom 后处理加载成功');
                      window.__bloomLoaded = true;
                    }, function() {
                      console.warn('[Bootstrap] BloomPass 加载失败');
                    });
                  }, function() { console.warn('[Bootstrap] LuminosityShader 加载失败'); });
                }, function() { console.warn('[Bootstrap] RenderPass 加载失败'); });
              }, function() { console.warn('[Bootstrap] CopyShader 加载失败'); });
            }, function() { console.warn('[Bootstrap] ShaderPass 加载失败'); });
          }, function() { console.warn('[Bootstrap] EffectComposer 加载失败'); });
        }, function() {
          console.warn('[Bootstrap] OrbitControls 加载失败，尝试下一个 CDN');
          tryLoadThree(cdnIndex + 1);
        });
      }, function() {
        console.warn('[Bootstrap] Three.js 加载失败，尝试下一个 CDN');
        tryLoadThree(cdnIndex + 1);
      });
    }
    // 启动加载
    tryLoadThree(0);
  </script>
  <!-- ECharts + ECharts GL CDN -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://unpkg.com/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
</head>
<body>

  <!-- 3D 地图容器 -->
  <div id="map-container">
    <div id="map-status">地图加载中...</div>
    <button id="map-mode-toggle" title="切换地图模式">2D</button>
  </div>

  <!-- 探险者状态栏 - 左上角 -->
  <div id="explorer-panel" class="glass-panel"></div>

  <!-- 路线详情面板 - 右侧滑出 -->
  <div id="route-panel" class="glass-panel"></div>

  <!-- 路线面板把手 - 山地模式面板关闭时显示 -->
  <button id="route-panel-toggle" title="打开路线信息面板">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
  </button>

  <!-- 装备图鉴面板 - 左侧滑出 -->
  <div id="gear-collection-panel" class="glass-panel"></div>

  <!-- 快捷装备栏 - 底部 -->
  <div id="quick-gear-bar"></div>

  <!-- 图片预览遮罩 -->
  <div id="image-overlay"></div>

  <!-- 游戏信息弹窗 -->
  <div id="info-modal" class="info-modal"></div>

  <!-- 地图悬停浮窗 -->
  <div id="map-tooltip"></div>

  <!-- 云端同步按钮 -->
  <button id="sync-cloud-btn" title="云同步 (Shift+点击配置)" style="position:fixed;bottom:100px;left:20px;width:44px;height:44px;border-radius:50%;border:2px solid rgba(100,150,255,0.5);cursor:pointer;z-index:99999;font-size:20px;display:flex;align-items:center;justify-content:center;background:rgba(20,40,80,0.9);color:#fff;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,100,255,0.3);transition:all 0.3s;outline:none;padding:0;margin:0;">☁️</button>

  <!-- JS 脚本（按依赖顺序加载） -->
  <script src="js/data.js"></script>
  <script src="js/dem.js"></script>
  <script>
    // 全局错误捕获，避免静默白屏
    window.onerror = function(msg, url, line, col, error) {
      console.error('JS Error:', msg, url, line, col, error);
    };
    window.onunhandledrejection = function(e) {
      console.error('Unhandled Promise:', e.reason);
    };
  </script>
  <script src="js/three-map.js"></script>
  <script src="js/map.js"></script>
  <script src="js/explorer.js"></script>
  <script src="js/gear.js"></script>
  <script src="js/route.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
